<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta | MenuPro</title>
  <meta name="description" content="Registra tu negocio en MenuPro y obtén tu menú digital profesional en minutos.">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.12;
      pointer-events: none;
    }

    .glow-1 { top: -200px; right: -200px; background: #ff5f6d; }
    .glow-2 { bottom: -200px; left: -200px; background: #ffc371; }
    .glow-3 { top: 50%; left: 50%; transform: translate(-50%, -50%); background: #7c3aed; opacity: 0.06; }

    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 10;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.4);
    }

    .form-input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 16px;
      font-weight: 500;
      font-family: 'Outfit', sans-serif;
      outline: none;
      transition: all 0.3s;
    }

    .form-input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .form-input:focus {
      border-color: #ff5f6d;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(255, 95, 109, 0.1);
    }

    .slug-preview {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      word-break: break-all;
    }

    .slug-preview span {
      color: #ffc371;
      font-weight: 700;
    }

    .slug-status {
      font-size: 11px;
      font-weight: 700;
      margin-top: 6px;
      letter-spacing: 0.05em;
    }

    .btn-register {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #ff5f6d, #ffc371);
      color: white;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s;
      box-shadow: 0 8px 32px rgba(255, 95, 109, 0.3);
    }

    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(255, 95, 109, 0.4);
    }

    .btn-register:active { transform: translateY(0); }
    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      color: white;
      padding: 16px 32px;
      border-radius: 16px;
      z-index: 9999;
      transition: all 0.4s;
      opacity: 0;
      font-weight: 600;
    }

    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.error { background: rgba(255, 77, 77, 0.95); }
    .toast.success { background: rgba(34, 197, 94, 0.95); }

    @media (max-width: 480px) {
      .glass-card { margin: 16px; padding: 28px 20px; }
    }
  </style>
</head>

<body>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>

  <div class="glass-card">
    <!-- Logo -->
    <div class="text-center mb-6">
      <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-red-500 to-orange-500 flex items-center justify-center mb-4 shadow-lg">
        <span class="text-3xl">🚀</span>
      </div>
      <h1 class="text-white text-2xl font-black tracking-tight">Crea tu Menú Digital</h1>
      <p class="text-gray-500 text-sm mt-1">Registra tu negocio y empieza en minutos</p>
    </div>

    <!-- Form -->
    <form id="registerForm" class="space-y-4" onsubmit="handleRegister(event)">
      <!-- Business Name -->
      <div>
        <label class="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-2">Nombre del Negocio</label>
        <input type="text" id="businessName" class="form-input" placeholder="Ej: Tronco E' Filo" required
          oninput="generateSlug(this.value)">
      </div>

      <!-- Slug -->
      <div>
        <label class="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-2">Enlace de tu Menú</label>
        <input type="text" id="slug" class="form-input" placeholder="tronco-e-filo" required
          oninput="validateSlug(this.value)" pattern="[a-z0-9\-]+" title="Solo letras minúsculas, números y guiones">
        <div class="slug-preview mt-2">
          tudominio.com/<span id="slugPreview">tu-negocio</span>
        </div>
        <div id="slugStatus" class="slug-status"></div>
      </div>

      <!-- Email -->
      <div>
        <label class="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-2">Email</label>
        <input type="email" id="email" class="form-input" placeholder="tu@email.com" required autocomplete="email">
      </div>

      <!-- Password -->
      <div>
        <label class="text-gray-400 text-xs font-bold uppercase tracking-widest block mb-2">Contraseña</label>
        <input type="password" id="password" class="form-input" placeholder="Mínimo 6 caracteres" required
          minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" id="btnRegister" class="btn-register mt-6">
        🚀 Crear Mi Menú Digital
      </button>
    </form>

    <div class="text-center mt-6">
      <p class="text-gray-500 text-sm">
        ¿Ya tienes cuenta?
        <a href="login.html" class="text-orange-400 font-bold hover:text-orange-300 transition-colors">Iniciar sesión</a>
      </p>
    </div>

    <div class="text-center mt-4">
      <a href="/" class="text-gray-600 text-xs font-medium hover:text-gray-400 transition-colors">← Volver al inicio</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=3"></script>
  <script>
    let slugTimeout = null;
    let slugAvailable = false;

    function showToast(msg, type = 'error') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show ' + type;
      setTimeout(() => t.className = 'toast', 4000);
    }

    function generateSlug(name) {
      const slug = name
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');

      document.getElementById('slug').value = slug;
      document.getElementById('slugPreview').textContent = slug || 'tu-negocio';
      validateSlug(slug);
    }

    async function validateSlug(slug) {
      const statusEl = document.getElementById('slugStatus');
      document.getElementById('slugPreview').textContent = slug || 'tu-negocio';

      if (!slug || slug.length < 3) {
        statusEl.textContent = '⚠️ Mínimo 3 caracteres';
        statusEl.style.color = '#f59e0b';
        slugAvailable = false;
        return;
      }

      // Reserved slugs
      const reserved = ['admin', 'login', 'register', 'api', 'app', 'dashboard', 'settings', 'js', 'css', 'img', 'order-status'];
      if (reserved.includes(slug)) {
        statusEl.textContent = '❌ Este enlace está reservado';
        statusEl.style.color = '#ef4444';
        slugAvailable = false;
        return;
      }

      statusEl.textContent = '⏳ Verificando...';
      statusEl.style.color = '#9ca3af';

      clearTimeout(slugTimeout);
      slugTimeout = setTimeout(async () => {
        try {
          const { data } = await supabaseClient
            .from('businesses')
            .select('id')
            .eq('slug', slug)
            .maybeSingle();

          if (data) {
            statusEl.textContent = '❌ Este enlace ya está en uso';
            statusEl.style.color = '#ef4444';
            slugAvailable = false;
          } else {
            statusEl.textContent = '✅ ¡Disponible!';
            statusEl.style.color = '#22c55e';
            slugAvailable = true;
          }
        } catch (err) {
          statusEl.textContent = '';
          slugAvailable = true;
        }
      }, 400);
    }

    async function handleRegister(e) {
      e.preventDefault();

      const businessName = document.getElementById('businessName').value.trim();
      const slug = document.getElementById('slug').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnRegister');

      if (!slugAvailable) {
        showToast('⚠️ El enlace del menú no está disponible');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Creando tu cuenta...';

      try {
        // 1. Create auth user
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({
          email,
          password
        });
        if (authError) throw authError;

        if (!authData || !authData.user) {
          throw new Error('Este correo ya está registrado o requiere confirmación. Intenta iniciar sesión.');
        }

        const userId = authData.user.id;

        // 2. Create business + settings using the database function
        const { data: bizId, error: bizError } = await supabaseClient.rpc('create_business_with_settings', {
          p_owner_id: userId,
          p_slug: slug,
          p_business_name: businessName
        });

        if (bizError) {
          // Cleanup: try to delete the auth user if business creation fails
          console.error('Business creation error:', bizError);
          throw new Error('Error creando el negocio: ' + bizError.message);
        }

        showToast('✅ ¡Cuenta creada exitosamente!', 'success');

        // Wait a moment then redirect
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 1500);

      } catch (err) {
        showToast('❌ ' + (err.message || 'Error en el registro'));
        btn.disabled = false;
        btn.textContent = '🚀 Crear Mi Menú Digital';
      }
    }
  </script>
</body>

</html>
